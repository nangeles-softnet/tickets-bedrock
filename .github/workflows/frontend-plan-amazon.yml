name: "Frontend Plan (Amazon)"

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-plan-amazon.yml"
      - ".github/workflows/frontend-deploy-amazon.yml"
  push:
    branches-ignore: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-plan-amazon.yml"
      - ".github/workflows/frontend-deploy-amazon.yml"

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "18"
  FRONTEND_DIR: frontend

jobs:
  build:
    name: Install & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.FRONTEND_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: "false"
