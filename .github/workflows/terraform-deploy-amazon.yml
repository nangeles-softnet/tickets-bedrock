name: "Terraform Deploy (Amazon)"

on:
  push:
    branches: [main]

concurrency:
  group: deploy-amazon-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_DIR: infra

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      HAS_AWS_CREDS: ${{ secrets.AWS_ROLE_ARN && secrets.AWS_REGION && 'true' || 'false' }}
      HAS_TFVARS: ${{ secrets.TF_VARS_FILE && 'true' || 'false' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        if: env.HAS_AWS_CREDS == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: infra/.terraform
          key: ${{ runner.os }}-tf-aws-${{ hashFiles('infra/**/*.tf') }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Reconstruct tfvars
        if: env.HAS_AWS_CREDS == 'true' && env.HAS_TFVARS == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: echo "${TF_VARS_CONTENT}" > envs_poc.tfvars
        env:
          TF_VARS_CONTENT: ${{ secrets.TF_VARS_FILE }}

      - name: Terraform Init
        if: env.HAS_AWS_CREDS == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Ensure ECR repository exists
        if: env.HAS_AWS_CREDS == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: |
          if [ -f envs_poc.tfvars ] && [ -s envs_poc.tfvars ]; then
            terraform apply -target=aws_ecr_repository.support_agent -var-file=envs_poc.tfvars -input=false -auto-approve -no-color
          else
            terraform apply -target=aws_ecr_repository.support_agent -input=false -auto-approve -no-color
          fi

      - name: Get ECR repository URL
        if: env.HAS_AWS_CREDS == 'true'
        id: ecr
        working-directory: ${{ env.TF_DIR }}
        run: |
          set -euo pipefail
          echo "repo_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        if: env.HAS_AWS_CREDS == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        if: env.HAS_AWS_CREDS == 'true'
        env:
          ECR_REPO_URL: ${{ steps.ecr.outputs.repo_url }}
        run: |
          set -euo pipefail
          docker build -t "${ECR_REPO_URL}:latest" ./backend/lambdas/support_agent
          docker push "${ECR_REPO_URL}:latest"

      - name: Terraform Validate
        if: env.HAS_AWS_CREDS == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: env.HAS_AWS_CREDS == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: |
          if [ -f envs_poc.tfvars ] && [ -s envs_poc.tfvars ]; then
            terraform plan -var-file=envs_poc.tfvars -input=false -no-color
          else
            terraform plan -input=false -no-color
          fi

      - name: Terraform Apply
        if: env.HAS_AWS_CREDS == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: |
          if [ -f envs_poc.tfvars ] && [ -s envs_poc.tfvars ]; then
            terraform apply -var-file=envs_poc.tfvars -input=false -auto-approve -no-color
          else
            terraform apply -input=false -auto-approve -no-color
          fi
